name: SEO Todos (daily worklist refresh)
# Decoupled from content generation ON PURPOSE. The authority wall — not
# article volume — is the bottleneck (see INDEXING_WORKLIST.md / the
# indexing census), so the daily human worklist must keep refreshing even
# on days we throttle or stop writing articles.
#
# Writes ONLY clear, methodology-driven cards into ops_tasks → dashboard
# /todos (the old vague "Authority · Community/Outreach/Asset" + funnel-review
# cards were retired 2026-06-02 — they had no concrete action):
#   1. daily_indexing_worklist  → "seo-reqidx" cards, all 3 sites (concrete
#      GSC Request-Indexing URL list — paste-and-click).
#   2. sop_worklist             → "authority" SOP cards, QUVII pilot only
#      (HARO/digital-PR daily SOP + guest-post direct-buy SOP, signed Jeff Zen).
#
# No site-repo checkout (scripts read/write the DB only). No article
# generation, no deploys. Safe to run every day.

on:
  schedule:
    - cron: '30 4 * * *'   # 04:30 UTC — after the 03:00 content crons settle
  workflow_dispatch:

concurrency:
  group: seo-todos
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        site: [ntecodex.com, pixelmatch.art, quvii.com]
    steps:
      - name: Checkout traffic-ops-core
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install -e .

      - name: Clear SOP cards (HARO + guest-post — Quvii pilot)
        if: matrix.site == 'quvii.com'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          HARO_LEDGER_URL: ${{ secrets.HARO_LEDGER_URL }}
        run: python -m scripts.sop_worklist --site ${{ matrix.site }}

      - name: Daily GSC Request-Indexing worklist
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python -m scripts.daily_indexing_worklist --site ${{ matrix.site }} --max-inspect 40
