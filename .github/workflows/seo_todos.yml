name: SEO Todos (daily worklist refresh)
# Decoupled from content generation ON PURPOSE. The authority wall — not
# article volume — is the bottleneck (see the indexing census), so the daily
# human worklist must keep refreshing even on days we throttle content.
#
# Writes ONLY clear, methodology-driven cards into ops_tasks → dashboard
# /todos. History:
#   - 2026-06-02: retired the vague "Authority · Community/Outreach/Asset" +
#     funnel-review cards (no concrete action).
#   - 2026-06-03: retired the "Daily GSC request-indexing" cards too.
#   - 2026-06-04: REINSTATED request-indexing as per-site copy-paste cards.
#     GSC diagnosis = "Discovered – currently not indexed": Google hasn't even
#     crawled the pages, so forcing a crawl IS the right lever now. The cards
#     are dependency-free (DB only, date-rotating 4 URLs/site) — no GSC API.
#     HARO retired (too slow); sop_worklist now ships only the guest-post card.
#
# Cards: daily_indexing_worklist → 3 per-site request-indexing lists (4 URLs
# each, rotating); sop_worklist → the guest-post-now card (Quvii). DB-only;
# no checkout, no article generation, no deploys.

on:
  schedule:
    - cron: '30 4 * * *'   # 04:30 UTC — after the 03:00 content crons settle
  workflow_dispatch:

concurrency:
  group: seo-todos
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout traffic-ops-core
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install -e .

      - name: Daily Request-indexing worklist (3 sites · 4 URLs each)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m scripts.daily_indexing_worklist

      - name: Guest-post SOP card (Quvii pilot)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          HARO_LEDGER_URL: ${{ secrets.HARO_LEDGER_URL }}
        run: python -m scripts.sop_worklist --site quvii.com
