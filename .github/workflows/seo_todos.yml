name: SEO Todos (daily portfolio retro + monitors)
# Decoupled from content generation ON PURPOSE. The authority wall — not
# article volume — is the bottleneck, so these daily ops keep running even on
# days we throttle content.
#
# History:
#   - 2026-06-04: ran per-site manual "GSC Request Indexing" copy-paste cards.
#   - 2026-06-23: RETIRED those (Jeff) — Google has no bulk indexing API for
#     general content and the manual pokes produced no measurable lift (clicks
#     stayed ~0 for weeks). Indexing is now pursued via authority (guest posts /
#     internal linking), and this workflow's job shifted to OBSERVABILITY.
#
# Daily steps (DB/GSC reads only — no checkout, no article gen, no deploys):
#   - daily_retro    → one cross-site AI retrospective LOG (metrics_raw)
#   - index_coverage → per-site indexed/discovered/unknown → dashboard panel
#   - sop_worklist   → the guest-post-now card (Quvii)

on:
  schedule:
    - cron: '30 4 * * *'   # 04:30 UTC — after the 03:00 content crons settle
  workflow_dispatch:

concurrency:
  group: seo-todos
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout traffic-ops-core
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install -e .

      # Manual "paste URL into GSC → Request Indexing" worklist RETIRED
      # (2026-06-23, Jeff): Google has no bulk indexing API for general content,
      # the manual copy-paste cards produced no measurable lift (clicks stayed
      # ~0 across weeks), and they were operator busywork. Indexing is now
      # pursued via authority (guest posts / internal linking), not manual pokes.

      - name: Portfolio daily retrospective (all sites, one AI log)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python -m scripts.daily_retro

      - name: Index-coverage monitor (4 sites → dashboard panel)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python -m scripts.index_coverage

      - name: Guest-post SOP card (Quvii pilot)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          HARO_LEDGER_URL: ${{ secrets.HARO_LEDGER_URL }}
        run: python -m scripts.sop_worklist --site quvii.com
