name: Migrate site caps + type floors (one-shot)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run? "true" = report only'
        required: true
        default: 'false'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }
      - run: pip install -e .
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m scripts.migrate_site_caps --dry-run
          else
            python -m scripts.migrate_site_caps
          fi
