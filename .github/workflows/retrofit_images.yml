name: Retrofit images for published articles

# Manual one-shot workflow. Triggered via "Run workflow" in the Actions
# UI. Iterates every currently-published article, deletes its old hero
# + inline files (if any), regenerates a full 1+6 image set keyed to
# the article's H2 outline, patches the markdown frontmatter, AND
# interleaves each inline image directly below its matching H2 in the
# body. Then commits + pushes to ntecodex-site and triggers a build.
#
# Cost ceiling enforced by --budget-usd (~$0.27 / article × 8 published
# ≈ $2.16 worst case; default $3 leaves slack).

on:
  workflow_dispatch:
    inputs:
      budget_usd:
        description: 'Hard $ cap for this retrofit run'
        type: string
        default: '3.00'
      inline_count:
        description: 'Inline images per article (in addition to hero)'
        type: string
        default: '6'
      limit:
        description: 'Max articles to process'
        type: string
        default: '20'

concurrency:
  group: retrofit-images
  cancel-in-progress: false

jobs:
  retrofit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout traffic-ops-core
        uses: actions/checkout@v4

      - name: Checkout ntecodex-site (cross-repo)
        uses: actions/checkout@v4
        with:
          repository: JeffZ911/ntecodex-site
          token: ${{ secrets.SITE_REPO_PAT }}
          path: ntecodex-site
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps + Pillow
        run: |
          pip install -e .
          pip install --quiet Pillow

      - name: Configure git for site repo
        working-directory: ntecodex-site
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"

      - name: Regenerate hero + inline images (force, ${{ github.event.inputs.inline_count }} per article)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: |
          python -m scripts.run_image_for_articles \
            --force-regenerate \
            --inline ${{ github.event.inputs.inline_count }} \
            --limit ${{ github.event.inputs.limit }} \
            --budget-usd ${{ github.event.inputs.budget_usd }}

      - name: Commit & push to ntecodex-site
        working-directory: ntecodex-site
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git add public/img src/content
            git commit -m "[auto] retrofit images (1+${{ github.event.inputs.inline_count }} per article)"
            git push
          else
            echo "no changes — nothing to retrofit"
            echo "skip_deploy=true" >> $GITHUB_ENV
          fi

      - name: Setup Node 22
        if: env.skip_deploy != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Astro site
        if: env.skip_deploy != 'true'
        working-directory: ntecodex-site
        run: |
          npm install
          npm run build

      - name: Deploy to Cloudflare Pages
        if: env.skip_deploy != 'true'
        working-directory: ntecodex-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy dist \
            --project-name ntecodex --branch main --commit-dirty=true

      - name: Notify on failure
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: |
          python -m src.utils.send_alert \
            --type=pipeline_failure \
            --workflow=retrofit_images \
            --severity=warning \
            --subject="Retrofit images workflow failed" \
            --message="Run ${{ github.run_id }} failed. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
