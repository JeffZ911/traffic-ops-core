name: Content Daily Pipeline
# Quality-first cadence (2026-05-25): output is capped per-day by
# sites.config.content_plan.daily_article_cap (ntecodex = 3). The batch
# script no-ops once the cap is hit, so we only need a few cron slots/day
# (with a couple spares for retries if a run fails). The 03:00 UTC slot is
# kept because the daily GSC request-indexing worklist is hour-guarded to it.
on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 7 * * *'
    - cron: '0 11 * * *'
    - cron: '0 15 * * *'
    - cron: '0 19 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

# Cancel an in-flight run if a newer one starts
concurrency:
  group: content-daily
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout traffic-ops-core
        uses: actions/checkout@v4

      - name: Checkout ntecodex-site (cross-repo)
        uses: actions/checkout@v4
        with:
          repository: JeffZ911/ntecodex-site
          # SITE_REPO_PAT must have repo:contents:write on ntecodex-site.
          # The auto-provided GITHUB_TOKEN can only access this repo, so we
          # need a PAT to push back to the site.
          token: ${{ secrets.SITE_REPO_PAT }}
          path: ntecodex-site
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install -e .

      - name: Configure git for site repo
        working-directory: ntecodex-site
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"

      # ---------------------------------------------------------------- 0.
      # Budget guard runs FIRST, before any cost-incurring step. Reads
      # sites.config.monthly_budget_usd (default $30) and the running
      # month-to-date sum of agent_runs.cost_usd. Sets two env flags the
      # later steps key on:
      #   BUDGET_ACTION=normal|warn|limit_extras|pause_all
      #   BUDGET_PERCENT=<float 0-1+>
      # On 'pause_all' the workflow exits 0 immediately (it's a controlled
      # stop, not a failure) so we don't burn red badges in the dashboard.
      - name: Budget guard
        id: budget
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set +e
          python -m src.utils.budget_guard --json > /tmp/budget.json
          rc=$?
          cat /tmp/budget.json
          ACTION=$(python -c "import json; print(json.load(open('/tmp/budget.json'))['action'])")
          PERCENT=$(python -c "import json; print(json.load(open('/tmp/budget.json'))['percent'])")
          SPENT=$(python -c "import json; print(json.load(open('/tmp/budget.json'))['spent_usd'])")
          BUDGET=$(python -c "import json; print(json.load(open('/tmp/budget.json'))['budget_usd'])")
          echo "action=$ACTION"   >> "$GITHUB_OUTPUT"
          echo "percent=$PERCENT" >> "$GITHUB_OUTPUT"
          echo "spent=$SPENT"     >> "$GITHUB_OUTPUT"
          echo "budget=$BUDGET"   >> "$GITHUB_OUTPUT"
          # rc=78 means "pause_all" — emit early-stop email and bail.
          if [ "$rc" = "78" ]; then
            echo "🛑 Budget guard says pause_all — short-circuiting workflow."
          fi

      - name: Alert on pause_all
        if: steps.budget.outputs.action == 'pause_all'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: |
          python -m src.utils.send_alert \
            --type=budget_pause \
            --workflow=content_daily \
            --severity=warning \
            --subject="[ntecodex] daily cron paused — monthly budget at ${{ steps.budget.outputs.percent }}" \
            --message="month-to-date spend ${{ steps.budget.outputs.spent }} of ${{ steps.budget.outputs.budget }}. Daily cron skipped. Resumes automatically on month rollover, or set sites.config.cron_paused=false to re-enable manually."

      # Only email at limit_extras (80-95%) — that's actionable. The
      # 'warn' band (50-80%) is normal mid-month spend and was flooding
      # the inbox with one info email per cron run (6+/day).
      - name: Alert on budget limit_extras
        if: steps.budget.outputs.action == 'limit_extras'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: |
          python -m src.utils.send_alert \
            --type=budget_warning \
            --workflow=content_daily \
            --severity=info \
            --subject="[ntecodex] budget ${{ steps.budget.outputs.action }} — ${{ steps.budget.outputs.spent }} of ${{ steps.budget.outputs.budget }}" \
            --message="action=${{ steps.budget.outputs.action }}. Core daily article will still be produced; maintenance tasks may be skipped if limit_extras."

      # ---------------------------------------------------------------- 1.
      - name: Collect yesterday's GA4 + GSC metrics
        if: steps.budget.outputs.action != 'pause_all'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          # run_collectors iterates EVERY active site in the DB; expose
          # every tenant's GA4 property here so the iteration finds the
          # right env var via site_env_prefix(). Missing secrets fall
          # through to skip-with-warn; they don't fail the run.
          NTECODEX_GA4_PROPERTY_ID: ${{ secrets.NTECODEX_GA4_PROPERTY_ID }}
          PIXELMATCH_GA4_PROPERTY_ID: ${{ secrets.PIXELMATCH_GA4_PROPERTY_ID }}
        run: python -m scripts.run_collectors

      # ---------------------------------------------------------------- 2.
      # Pool top-up + auto-balance starved article types. The
      # --auto-balance-types flag was added in v1.1.x; it scans for
      # categories with 0 published / 14d and auto-seeds 5-8 keywords
      # each (source='auto_type_balance'). KeywordSelector's diversity
      # bonus then surfaces those on subsequent crons — replaces the
      # old manual banner_batch workflow.
      # When the budget action is 'limit_extras' (>80% spent), the
      # auto-balance pass is dropped to save an LLM call per starved
      # type — the core top-up still runs.
      - name: Garden the keyword pool
        if: steps.budget.outputs.action != 'pause_all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ steps.budget.outputs.action }}" = "limit_extras" ]; then
            python -m scripts.keyword_gardener --min-planned 20 --target 12
          else
            python -m scripts.keyword_gardener --min-planned 20 --target 12 \
              --auto-balance-types
          fi

      # ------------------------------------------------------------- 2b.
      # Trend-jacking ("蹭话题"): once/day, seed time-sensitive 'trend'
      # keywords for rising topics. KeywordSelector gives these a decaying
      # freshness bonus so they're written same-day (QDF window) then expire.
      # Hour-guarded to 07:00 UTC so it runs exactly once per day.
      - name: Trend scan (keyword gardener --trending)
        if: steps.budget.outputs.action != 'pause_all'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "$(date -u +%H)" = "07" ]; then
            python -m scripts.keyword_gardener --trending --target 5
          else
            echo "skip — trend scan runs once/day at 07:00 UTC (now $(date -u +%H):00)"
          fi

      # ---------------------------------------------------------------- 3.
      # Velocity push (Phase 2.4): 4 articles per cron invocation, 6
      # cron/day → 24 attempts/day. Per-iteration budget check inside
      # run_batch_smoke aborts the loop early if we cross 95% mid-batch.
      - name: Generate articles (batch=4)
        if: steps.budget.outputs.action != 'pause_all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m scripts.run_batch_smoke --count 3 --max-retries 1

      # ---------------------------------------------------------------- 4.
      - name: Publish article markdown to ntecodex-site
        if: steps.budget.outputs.action != 'pause_all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: python -m scripts.publish_articles

      # ---------------------------------------------------------------- 5.
      # The new-article image step covers TODAY's article. The retrofit
      # step (5b) backfills older articles that were published with the
      # pre-v1.1 1+2 image template. Both share Pillow install.
      - name: Install Pillow (image processing)
        if: steps.budget.outputs.action != 'pause_all'
        run: pip install --quiet Pillow

      - name: Generate hero + 6 inline images for the NEW article
        timeout-minutes: 25
        if: steps.budget.outputs.action != 'pause_all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: |
          python -m scripts.run_image_for_articles --new-only --inline 6 --budget-usd 0.50

      # ---------------------------------------------------------------- 5b.
      # Backfill the OLDEST article that has fewer than 4 inline images
      # in the DB. Skipped when the budget is at 'limit_extras' or higher
      # so the core "produce today's article" path stays funded. One
      # backfill / day caps the spend at ~$0.27/day.
      - name: Backfill 1 under-imaged article
        timeout-minutes: 10
        if: steps.budget.outputs.action == 'normal' || steps.budget.outputs.action == 'warn'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: |
          python -m scripts.backfill_one_under_imaged --budget-usd 0.40

      # ---------------------------------------------------------------- 5c.
      # Closing the GSC feedback loop: rewrite ONE published article per
      # day, picked from the latest seo_intelligence_weekly report's
      # rewrite_candidates list. Skipped at 'limit_extras' (Pro-model
      # call is ~$0.60/run, biggest single AI expense in the cron).
      # Safety brake lives in scripts/rewrite_one_article.py — articles
      # with 3 failed rewrites are auto-marked rewrite_skipped.
      # continue-on-error: this is incremental optimization, not core
      # publishing — a crash here must not block today's deploy.
      - name: Rewrite 1 page-2 article (GSC feedback loop)
        timeout-minutes: 10
        if: steps.budget.outputs.action == 'normal' || steps.budget.outputs.action == 'warn'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: |
          python -m scripts.rewrite_one_article --budget-usd 1.00

      # ---------------------------------------------------------------- 6.
      # P0 FIX (2026-05-13): commit + push the generated .md / image
      # artifacts back to the ntecodex-site repo BEFORE deploy.
      #
      # Root cause this addresses: every cron checks out a clean copy of
      # ntecodex-site, writes new content into it, then `wrangler pages
      # deploy dist` ships one build — but the workspace is ephemeral.
      # The next cron checks out the OLD repo (without our new files),
      # so each cron clobbers the previous cron's deploy. DB ended up
      # with 111 published but the live sitemap only showed 45 URLs.
      #
      # Fix: stage generated content, commit, pull --rebase to absorb
      # any concurrent cron's push, then push. Retry up to 3 times on
      # race losses. Then the deploy below builds from a repo that
      # actually contains today's AND yesterday's articles.
      - name: Commit + push generated content back to site repo
        if: steps.budget.outputs.action != 'pause_all'
        working-directory: ntecodex-site
        run: |
          set -e
          # Stage the two trees the pipeline writes into:
          #   src/content/**/*.md  ← PublishAgent
          #   public/img/<slug>/*  ← ImageAgent (hero + inline images)
          # Per-path add: git add is all-or-nothing when given multiple
          # pathspecs — if any one doesn't exist on disk (very common:
          # public/_redirects only exists when content_daily seeds it,
          # public/img is empty when image gen fails or is skipped), the
          # ENTIRE add fails with exit 128 and stages nothing. The `|| true`
          # then silently swallows it, `git diff --cached --quiet` matches,
          # and the step exits 0 with "no new content" while real .md /
          # .webp files sit un-committed. Add each path independently.
          git add src/content 2>/dev/null || true
          git add public/img 2>/dev/null || true
          git add public/_redirects 2>/dev/null || true

          # Nothing to commit? exit clean — the deploy will still run
          # against whatever is already in the repo.
          if git diff --cached --quiet; then
            echo "ℹ️  no new content this cron — skipping commit"
            exit 0
          fi

          STAMP="$(date -u +%Y-%m-%d-%H%MZ)"
          git commit -m "[auto-cron] content batch $STAMP (run ${{ github.run_id }})"

          # Race-tolerant push: another concurrent cron may have pushed
          # while we were generating. Rebase locally, retry up to 3×.
          attempt=0
          until git push origin HEAD:main; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge 3 ]; then
              echo "❌ push failed after 3 attempts"
              exit 1
            fi
            echo "⚠️  push race lost (attempt $attempt) — rebasing"
            git pull --rebase origin main
          done
          echo "✓ pushed content batch to ntecodex-site"

      # ---------------------------------------------------------------- 7.
      - name: Setup Node 22
        if: env.skip_deploy != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Inject per-site PUBLIC_* env vars into <site_repo>/.env.local
      # so Astro's import.meta.env picks them up at build time. Reads
      # sites.config.{ga4_measurement_id, adsense_publisher_id} first,
      # falls back to <SLUG>_<KEY> env. Operator can change the DB
      # value via /sites and it takes effect on the very next deploy.
      - name: Inject per-site tracking IDs into Astro env
        if: env.skip_deploy != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          NTECODEX_GA4_MEASUREMENT_ID: ${{ secrets.NTECODEX_GA4_MEASUREMENT_ID }}
          NTECODEX_ADSENSE_PUBLISHER_ID: ${{ secrets.NTECODEX_ADSENSE_PUBLISHER_ID }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: python -m scripts.inject_site_env

      - name: Build Astro site
        if: env.skip_deploy != 'true'
        working-directory: ntecodex-site
        run: |
          npm install
          npm run build

      - name: Deploy to Cloudflare Pages
        if: env.skip_deploy != 'true'
        working-directory: ntecodex-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy dist \
            --project-name ntecodex --branch main --commit-dirty=true

      # ---------------------------------------------------------------- 7b.
      # Re-submit the sitemap to GSC after every content batch so Google
      # re-downloads the latest URL set instead of sitting on a stale
      # snapshot for weeks. This is THE legitimate "make Google
      # re-discover content" API lever (the old ping endpoint is dead,
      # URL Inspection is read-only, Indexing API is JobPosting-only).
      # Needs WRITE OAuth scope; if the token is still readonly this
      # step just logs a 403 and continues (continue-on-error).
      - name: Re-submit sitemap to GSC
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python -m scripts.resubmit_sitemap --site ntecodex.com

      # ---------------------------------------------------------------- 7c.
      # Gray-area accelerator: nudge today's + clean-tier + unknown URLs
      # via the Indexing API. Skips cleanly if no service account is
      # configured. Sitemap (above) + internal links are the primary
      # levers; this is best-effort on top.
      - name: Request indexing (Indexing API, best-effort)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.NTECODEX_GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m scripts.request_indexing --site ntecodex.com --limit 150

      # ---------------------------------------------------------------- 7d.
      # IndexNow push — Bing/Yandex/DuckDuckGo/ChatGPT-Search discovery.
      # Google ignores it (harmless); Bing fetches fast. Submits today's
      # new URLs. No OAuth needed — auth is the hosted key file.
      - name: IndexNow submit (Bing/Yandex)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m scripts.indexnow_submit --site ntecodex.com

      # ---------------------------------------------------------------- 7e.
      # Auto-flag human action items into ops_tasks (Dashboard /todos):
      # GA4 missing, GSC inaccessible, budget >80%, 3d zero-published,
      # OAuth failing. Idempotent (dedup by title); auto-resolves when
      # the condition clears. Cheap — runs every cron.
      - name: Auto-flag ops tasks
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: python -m scripts.ops_autoflag --site ntecodex.com

      # ---------------------------------------------------------------- 7f.
      # Daily GSC request-indexing worklist → ops_tasks card (top-10
      # unknown URLs to hand-request). Hour-guarded to ~once/day to
      # respect the urlInspection quota; auto-graduates off at >80%
      # indexed. continue-on-error.
      - name: Daily GSC request-indexing worklist
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          if [ "$(date -u +%H)" = "03" ]; then
            python -m scripts.daily_indexing_worklist --site ntecodex.com --max-inspect 40
          else
            echo "skip — worklist runs once/day at 03:00 UTC (current $(date -u +%H):00)"
          fi

      # ---------------------------------------------------------------- 8.
      # Zero-published streak check. If three days in a row produce no
      # `status='published'` article, fire a warning email so the
      # operator can investigate before a week of silent failure piles
      # up. continue-on-error so a DB / SMTP hiccup here never blocks
      # the deploy itself (which is already succeeded above).
      # Phase 2.5 (2026-05-13): replaced the publish-streak alert with
      # real Google-traction signals. At 72 attempts/day "0 published
      # for 3 days" is a noisy signal — the meaningful signal is
      # whether Google is indexing + ranking us. The streak script
      # stays in repo for emergency manual use but is OUT of cron.
      - name: GSC traction signals (stagnation + positive)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: python -m src.maintenance.gsc_signal_check

      # ---------------------------------------------------------------- 9.
      # Velocity check: alert when 3-day rolling pass-rate is below 50%
      # (slowdown — pool quality / writer issue) or above 75% (headroom —
      # safe to push more cron / day). Deduplicated via
      # daily_reports.data_snapshot.velocity_alert so we don't email
      # 6× / day. continue-on-error so it never blocks the deploy.
      - name: Velocity check (3-day pass-rate band)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: python -m src.maintenance.velocity_check

      # ---------------------------------------------------------------- 10.
      # Auto-finalize any article stuck in draft/qa_pending/writing >1h.
      # Without this, mid-pipeline crashes leave the Dashboard showing
      # phantom "pending review" rows, violating the autonomous-operations
      # principle. continue-on-error so a DB hiccup never blocks deploy.
      - name: Finalize stuck articles (auto-resolve mid-pipeline stalls)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m scripts.finalize_stuck_articles

      # ---------------------------------------------------------------- 11.
      # Mobile-responsiveness check: scan today's published articles for
      # long unbroken text tokens that the global CSS rules don't cover.
      # Emails warning on regression; dedup'd in daily_reports so we
      # don't blast 6 alerts/day for one bad ship.
      - name: Mobile responsiveness check
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: python -m scripts.check_mobile_responsive

      # ---------------------------------------------------------------- 9.
      - name: Notify on failure
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: |
          python -m src.utils.send_alert \
            --type=pipeline_failure \
            --workflow=content_daily \
            --severity=critical \
            --subject="Content Daily Pipeline failed" \
            --message="Run ${{ github.run_id }} on ${{ github.repository }} failed.
          Check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
