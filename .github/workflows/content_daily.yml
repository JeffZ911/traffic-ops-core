name: Content Daily Pipeline
# Phase 2.4 (2026-05-12): velocity push — 6 cron/day × 4 articles per
# cron = 24 attempts/day. With ~65% pass-rate this should publish
# 15-17 articles/day. Budget guard ($150/month, ~30% safety margin
# for ~$0.40/article × 17/day × 30 = ~$204 worst case) sits in front
# of every cost step.
on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC = 10:00 Asia/Shanghai
    - cron: '0 6 * * *'   # 06:00 UTC = 14:00 Asia/Shanghai
    - cron: '0 10 * * *'  # 10:00 UTC = 18:00 Asia/Shanghai
    - cron: '0 14 * * *'  # 14:00 UTC = 22:00 Asia/Shanghai
    - cron: '0 18 * * *'  # 18:00 UTC = 02:00 Asia/Shanghai (next day)
    - cron: '0 22 * * *'  # 22:00 UTC = 06:00 Asia/Shanghai (next day)
  workflow_dispatch:

# Cancel an in-flight run if a newer one starts
concurrency:
  group: content-daily
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout traffic-ops-core
        uses: actions/checkout@v4

      - name: Checkout ntecodex-site (cross-repo)
        uses: actions/checkout@v4
        with:
          repository: JeffZ911/ntecodex-site
          # SITE_REPO_PAT must have repo:contents:write on ntecodex-site.
          # The auto-provided GITHUB_TOKEN can only access this repo, so we
          # need a PAT to push back to the site.
          token: ${{ secrets.SITE_REPO_PAT }}
          path: ntecodex-site
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install -e .

      - name: Configure git for site repo
        working-directory: ntecodex-site
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"

      # ---------------------------------------------------------------- 0.
      # Budget guard runs FIRST, before any cost-incurring step. Reads
      # sites.config.monthly_budget_usd (default $30) and the running
      # month-to-date sum of agent_runs.cost_usd. Sets two env flags the
      # later steps key on:
      #   BUDGET_ACTION=normal|warn|limit_extras|pause_all
      #   BUDGET_PERCENT=<float 0-1+>
      # On 'pause_all' the workflow exits 0 immediately (it's a controlled
      # stop, not a failure) so we don't burn red badges in the dashboard.
      - name: Budget guard
        id: budget
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set +e
          python -m src.utils.budget_guard --json > /tmp/budget.json
          rc=$?
          cat /tmp/budget.json
          ACTION=$(python -c "import json; print(json.load(open('/tmp/budget.json'))['action'])")
          PERCENT=$(python -c "import json; print(json.load(open('/tmp/budget.json'))['percent'])")
          SPENT=$(python -c "import json; print(json.load(open('/tmp/budget.json'))['spent_usd'])")
          BUDGET=$(python -c "import json; print(json.load(open('/tmp/budget.json'))['budget_usd'])")
          echo "action=$ACTION"   >> "$GITHUB_OUTPUT"
          echo "percent=$PERCENT" >> "$GITHUB_OUTPUT"
          echo "spent=$SPENT"     >> "$GITHUB_OUTPUT"
          echo "budget=$BUDGET"   >> "$GITHUB_OUTPUT"
          # rc=78 means "pause_all" — emit early-stop email and bail.
          if [ "$rc" = "78" ]; then
            echo "🛑 Budget guard says pause_all — short-circuiting workflow."
          fi

      - name: Alert on pause_all
        if: steps.budget.outputs.action == 'pause_all'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: |
          python -m src.utils.send_alert \
            --type=budget_pause \
            --workflow=content_daily \
            --severity=warning \
            --subject="[ntecodex] daily cron paused — monthly budget at ${{ steps.budget.outputs.percent }}" \
            --message="month-to-date spend ${{ steps.budget.outputs.spent }} of ${{ steps.budget.outputs.budget }}. Daily cron skipped. Resumes automatically on month rollover, or set sites.config.cron_paused=false to re-enable manually."

      - name: Alert on budget warn / limit_extras
        if: steps.budget.outputs.action == 'warn' || steps.budget.outputs.action == 'limit_extras'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: |
          python -m src.utils.send_alert \
            --type=budget_warning \
            --workflow=content_daily \
            --severity=info \
            --subject="[ntecodex] budget ${{ steps.budget.outputs.action }} — ${{ steps.budget.outputs.spent }} of ${{ steps.budget.outputs.budget }}" \
            --message="action=${{ steps.budget.outputs.action }}. Core daily article will still be produced; maintenance tasks may be skipped if limit_extras."

      # ---------------------------------------------------------------- 1.
      - name: Collect yesterday's GA4 + GSC metrics
        if: steps.budget.outputs.action != 'pause_all'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          NTECODEX_GA4_PROPERTY_ID: ${{ secrets.NTECODEX_GA4_PROPERTY_ID }}
        run: python -m scripts.run_collectors

      # ---------------------------------------------------------------- 2.
      # Pool top-up + auto-balance starved article types. The
      # --auto-balance-types flag was added in v1.1.x; it scans for
      # categories with 0 published / 14d and auto-seeds 5-8 keywords
      # each (source='auto_type_balance'). KeywordSelector's diversity
      # bonus then surfaces those on subsequent crons — replaces the
      # old manual banner_batch workflow.
      # When the budget action is 'limit_extras' (>80% spent), the
      # auto-balance pass is dropped to save an LLM call per starved
      # type — the core top-up still runs.
      - name: Garden the keyword pool
        if: steps.budget.outputs.action != 'pause_all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ steps.budget.outputs.action }}" = "limit_extras" ]; then
            python -m scripts.keyword_gardener --min-planned 20 --target 12
          else
            python -m scripts.keyword_gardener --min-planned 20 --target 12 \
              --auto-balance-types
          fi

      # ---------------------------------------------------------------- 3.
      # Velocity push (Phase 2.4): 4 articles per cron invocation, 6
      # cron/day → 24 attempts/day. Per-iteration budget check inside
      # run_batch_smoke aborts the loop early if we cross 95% mid-batch.
      - name: Generate articles (batch=4)
        if: steps.budget.outputs.action != 'pause_all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m scripts.run_batch_smoke --count 4 --max-retries 1

      # ---------------------------------------------------------------- 4.
      - name: Publish article markdown to ntecodex-site
        if: steps.budget.outputs.action != 'pause_all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: python -m scripts.publish_articles

      # ---------------------------------------------------------------- 5.
      # The new-article image step covers TODAY's article. The retrofit
      # step (5b) backfills older articles that were published with the
      # pre-v1.1 1+2 image template. Both share Pillow install.
      - name: Install Pillow (image processing)
        if: steps.budget.outputs.action != 'pause_all'
        run: pip install --quiet Pillow

      - name: Generate hero + 6 inline images for the NEW article
        if: steps.budget.outputs.action != 'pause_all'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: |
          python -m scripts.run_image_for_articles --new-only --inline 6 --budget-usd 0.50

      # ---------------------------------------------------------------- 5b.
      # Backfill the OLDEST article that has fewer than 4 inline images
      # in the DB. Skipped when the budget is at 'limit_extras' or higher
      # so the core "produce today's article" path stays funded. One
      # backfill / day caps the spend at ~$0.27/day.
      - name: Backfill 1 under-imaged article
        if: steps.budget.outputs.action == 'normal' || steps.budget.outputs.action == 'warn'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: |
          python -m scripts.backfill_one_under_imaged --budget-usd 0.40

      # ---------------------------------------------------------------- 5c.
      # Closing the GSC feedback loop: rewrite ONE published article per
      # day, picked from the latest seo_intelligence_weekly report's
      # rewrite_candidates list. Skipped at 'limit_extras' (Pro-model
      # call is ~$0.60/run, biggest single AI expense in the cron).
      # Safety brake lives in scripts/rewrite_one_article.py — articles
      # with 3 failed rewrites are auto-marked rewrite_skipped.
      # continue-on-error: this is incremental optimization, not core
      # publishing — a crash here must not block today's deploy.
      - name: Rewrite 1 page-2 article (GSC feedback loop)
        if: steps.budget.outputs.action == 'normal' || steps.budget.outputs.action == 'warn'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
          SITE_REPO_PATH: ${{ github.workspace }}/ntecodex-site
        run: |
          python -m scripts.rewrite_one_article --budget-usd 1.00

      # ---------------------------------------------------------------- 7.
      - name: Setup Node 22
        if: env.skip_deploy != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Astro site
        if: env.skip_deploy != 'true'
        working-directory: ntecodex-site
        run: |
          npm install
          npm run build

      - name: Deploy to Cloudflare Pages
        if: env.skip_deploy != 'true'
        working-directory: ntecodex-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy dist \
            --project-name ntecodex --branch main --commit-dirty=true

      # ---------------------------------------------------------------- 8.
      # Zero-published streak check. If three days in a row produce no
      # `status='published'` article, fire a warning email so the
      # operator can investigate before a week of silent failure piles
      # up. continue-on-error so a DB / SMTP hiccup here never blocks
      # the deploy itself (which is already succeeded above).
      - name: Zero-published streak check (3-day window)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: python -m scripts.check_publish_streak --days 3

      # ---------------------------------------------------------------- 9.
      # Velocity check: alert when 3-day rolling pass-rate is below 50%
      # (slowdown — pool quality / writer issue) or above 75% (headroom —
      # safe to push more cron / day). Deduplicated via
      # daily_reports.data_snapshot.velocity_alert so we don't email
      # 6× / day. continue-on-error so it never blocks the deploy.
      - name: Velocity check (3-day pass-rate band)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: python -m src.maintenance.velocity_check

      # ---------------------------------------------------------------- 10.
      # Auto-finalize any article stuck in draft/qa_pending/writing >1h.
      # Without this, mid-pipeline crashes leave the Dashboard showing
      # phantom "pending review" rows, violating the autonomous-operations
      # principle. continue-on-error so a DB hiccup never blocks deploy.
      - name: Finalize stuck articles (auto-resolve mid-pipeline stalls)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m scripts.finalize_stuck_articles

      # ---------------------------------------------------------------- 9.
      - name: Notify on failure
        if: failure()
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_RECIPIENT_EMAIL: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        run: |
          python -m src.utils.send_alert \
            --type=pipeline_failure \
            --workflow=content_daily \
            --severity=critical \
            --subject="Content Daily Pipeline failed" \
            --message="Run ${{ github.run_id }} on ${{ github.repository }} failed.
          Check logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
